<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1500" viewBox="0 0 900 1500">
  <defs>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:40px;font-weight:700;fill:#111}
      .boxTitle{font-family:Arial,Helvetica,sans-serif;font-size:28px;font-weight:700;fill:#111}
      .boxSub{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:500;fill:#222}
      .stroke{stroke:#222;stroke-width:3}
    </style>

    <linearGradient id="blueFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EEF4FF"/>
      <stop offset="1" stop-color="#DCE8FF"/>
    </linearGradient>
    <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9F8EE"/>
      <stop offset="1" stop-color="#D6F0DD"/>
    </linearGradient>

    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111"/>
    </marker>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="80" text-anchor="middle" class="title">(a) System Flowchart</text>

  <!-- Layout constants (implicit): center x=450, box w=760, h=140, rx=20 -->

  <!-- Box 1 -->
  <g filter="url(#softShadow)">
    <rect x="70" y="140" width="760" height="140" rx="22" fill="url(#blueFill)" class="stroke"/>
  </g>
  <text x="450" y="200" text-anchor="middle" class="boxTitle">1. Hand Assist Mode Selector</text>
  <text x="450" y="238" text-anchor="middle" class="boxSub">(foot-only vs hand-assisted)</text>

  <!-- Arrow 1 -->
  <line x1="450" y1="280" x2="450" y2="345" class="stroke" marker-end="url(#arrow)"/>

  <!-- Box 2 -->
  <g filter="url(#softShadow)">
    <rect x="70" y="360" width="760" height="150" rx="22" fill="url(#blueFill)" class="stroke"/>
  </g>
  <text x="450" y="425" text-anchor="middle" class="boxTitle">2. Stage 1: Train Contact-Conditioned PPO</text>
  <text x="450" y="465" text-anchor="middle" class="boxSub">state + command + target contact -&gt; joint targets</text>

  <!-- Arrow 2 -->
  <line x1="450" y1="510" x2="450" y2="575" class="stroke" marker-end="url(#arrow)"/>

  <!-- Box 3 -->
  <g filter="url(#softShadow)">
    <rect x="70" y="590" width="760" height="160" rx="22" fill="url(#blueFill)" class="stroke"/>
  </g>
  <text x="450" y="655" text-anchor="middle" class="boxTitle">3. Stage 2: Contact Sampling with Trained PPO</text>
  <text x="450" y="695" text-anchor="middle" class="boxSub">try many candidate contacts across environment variations</text>

  <!-- Arrow 3 -->
  <line x1="450" y1="750" x2="450" y2="815" class="stroke" marker-end="url(#arrow)"/>

  <!-- Box 4 -->
  <g filter="url(#softShadow)">
    <rect x="70" y="830" width="760" height="160" rx="22" fill="url(#blueFill)" class="stroke"/>
  </g>
  <text x="450" y="895" text-anchor="middle" class="boxTitle">4. Stage 3: Train Visual Contact Utility Model</text>
  <text x="450" y="935" text-anchor="middle" class="boxSub">depth + state + candidate point -&gt; Q_contact</text>

  <!-- Arrow 4 -->
  <line x1="450" y1="990" x2="450" y2="1055" class="stroke" marker-end="url(#arrow)"/>

  <!-- Box 5 -->
  <g filter="url(#softShadow)">
    <rect x="70" y="1070" width="760" height="160" rx="22" fill="url(#blueFill)" class="stroke"/>
  </g>
  <text x="450" y="1135" text-anchor="middle" class="boxTitle">5. Stage 4: Guided Locomotion</text>
  <text x="450" y="1175" text-anchor="middle" class="boxSub">select high-Q contact -&gt; fine-tune PPO</text>

  <!-- Arrow 5 -->
  <line x1="450" y1="1230" x2="450" y2="1295" class="stroke" marker-end="url(#arrow)"/>

  <!-- Box 6 -->
  <g filter="url(#softShadow)">
    <rect x="70" y="1310" width="760" height="160" rx="22" fill="url(#greenFill)" class="stroke"/>
  </g>
  <text x="450" y="1375" text-anchor="middle" class="boxTitle">6. Final Deployment</text>
  <text x="450" y="1415" text-anchor="middle" class="boxSub">depth + state -&gt; select contact -&gt; locomotion</text>

</svg>